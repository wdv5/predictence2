# ─────────────────────────────────────────────────────────────────────────────
#  Phase 2 — Predictive Maintenance Agent Infrastructure
#
#  Services:
#    timescaledb   PostgreSQL 16 + TimescaleDB 2.x  (persistent metrics store)
#    redis         Redis 7                           (latest metrics cache)
#    prometheus    Prometheus 2.x                    (metrics source)
#    node_exporter Node Exporter                     (host metrics → Prometheus)
#    backend       FastAPI application
#    n8n           Workflow automation (optional)
#    dashboard     Static file server for index.html
# ─────────────────────────────────────────────────────────────────────────────

networks:
  predictence:
    driver: bridge

volumes:
  tsdb_data:
  redis_data:
  prometheus_data:
  n8n_data:

services:

  # ── TimescaleDB ─────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: predictence_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: predictence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    networks:
      - predictence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d predictence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: predictence_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - predictence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node Exporter (host metrics) ─────────────────────────────────────────────
  node_exporter:
    image: prom/node-exporter:latest
    container_name: predictence_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - predictence

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: predictence_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - predictence
    depends_on:
      - node_exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: predictence_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # TimescaleDB
      DATABASE_URL: postgresql://postgres:postgres@timescaledb:5432/predictence
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Prometheus
      PROMETHEUS_URL: http://prometheus:9090
      # n8n webhooks (optional)
      N8N_ENABLED: "false"
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/agent-alert
      N8N_PREDICTIVE_WEBHOOK_URL: http://n8n:5678/webhook/cpu-threshold-forecast
    volumes:
      - ../backend/data:/app/backend/data
    networks:
      - predictence
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Static Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: predictence_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    networks:
      - predictence
    depends_on:
      - backend

  # ── n8n (optional workflow automation) ──────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: predictence_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - predictence
    profiles:
      - n8n   # start with: docker compose --profile n8n up
